<ui:composition template="/WEB-INF/plantilla.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="primefaces">
<f:metadata>
    <f:viewAction action="#{importacionBean.verificarAcceso()}"/>
</f:metadata>
<ui:define name="titulo">Importacion de datos</ui:define>
<ui:define name="contenido">
    <h:form id="frm" enctype="multipart/form-data">
        <p:growl id="mensajes" showDetail="true" life="4000"/>
        <div class="barra-tabla" style="gap:.6rem; flex-wrap:wrap; align-items:flex-end;">
            <div class="campo"><label>Tipo</label>
                <p:selectOneMenu value="#{importacionBean.tipo}" style="width:12rem;">
                    <f:selectItems value="#{importacionBean.tipos}" var="t" itemLabel="#{t}" itemValue="#{t}"/>
                </p:selectOneMenu></div>
            <p:commandButton value="Plantilla CSV" icon="pi pi-download" ajax="false"
                             rendered="#{sesionUsuario.puede('importacion','EXPORTAR')}">
                <p:fileDownload value="#{importacionBean.plantilla}"/>
            </p:commandButton>
            <div class="campo"><label>Archivo CSV (UTF-8)</label>
                <p:fileUpload mode="simple" skinSimple="true" value="#{importacionBean.archivo}" allowTypes="/(\.|\/)(csv|txt)$/"/></div>
            <p:commandButton value="Previsualizar" icon="pi pi-eye" ajax="false"
                             actionListener="#{importacionBean.previsualizar()}"/>
        </div>

        <p:dataTable id="prev" var="fp" value="#{importacionBean.preview}" rendered="#{not empty importacionBean.preview}"
                     paginator="true" rows="15" emptyMessage="Sin filas" styleClass="mt-2">
            <p:column headerText="#" style="width:4rem;">#{fp.numero}</p:column>
            <p:column headerText="Valido" style="width:6rem; text-align:center;">
                <p:tag value="#{fp.valido ? 'OK' : 'ERROR'}" severity="#{fp.valido ? 'success' : 'danger'}"/>
            </p:column>
            <p:column headerText="Datos"><h:outputText value="#{fp.resumen}"/></p:column>
            <p:column headerText="Error"><h:outputText value="#{fp.error}" style="color:#e63946;"/></p:column>
        </p:dataTable>

        <div rendered="#{not empty importacionBean.preview}" style="margin-top:.6rem;">
            <p:commandButton value="Confirmar importacion" icon="pi pi-check"
                             rendered="#{sesionUsuario.puede('importacion','CREAR')}"
                             actionListener="#{importacionBean.confirmar()}" update="frm">
                <p:confirm header="Confirmar" message="La importacion es atomica: si hay errores no se inserta nada. Continuar?" icon="pi pi-exclamation-triangle"/>
            </p:commandButton>
            <span style="margin-left:1rem; color:#6b7280;">Politica atomica: no se insertan datos parciales.</span>
        </div>

        <h:panelGroup rendered="#{not empty importacionBean.resultado}" layout="block" style="margin-top:.6rem;">
            <p:tag value="Resultado: #{importacionBean.resultado.ok ? 'OK' : 'FALLIDO'} — validas #{importacionBean.resultado.filasValidas}, errores #{importacionBean.resultado.filasError}"
                   severity="#{importacionBean.resultado.ok ? 'success' : 'danger'}"/>
        </h:panelGroup>

        <h3 style="margin-top:1.4rem;">Historial de importaciones</h3>
        <p:dataTable var="h" value="#{importacionBean.historial}" paginator="true" rows="10" emptyMessage="Sin importaciones">
            <p:column headerText="Fecha" style="width:11rem;"><h:outputText value="#{h[0]}"><f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy HH:mm"/></h:outputText></p:column>
            <p:column headerText="Tipo" style="width:8rem;">#{h[1]}</p:column>
            <p:column headerText="Archivo">#{h[2]}</p:column>
            <p:column headerText="Usuario" style="width:8rem;">#{h[3]}</p:column>
            <p:column headerText="Validas" style="width:6rem; text-align:right;">#{h[4]}</p:column>
            <p:column headerText="Errores" style="width:6rem; text-align:right;">#{h[5]}</p:column>
            <p:column headerText="Resultado" style="width:8rem; text-align:center;">
                <p:tag value="#{h[6]}" severity="#{h[6] eq 'OK' ? 'success' : 'danger'}"/>
            </p:column>
        </p:dataTable>

        <p:confirmDialog global="true" showEffect="fade">
            <p:commandButton value="Si" type="button" styleClass="ui-confirmdialog-yes"/>
            <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-secondary"/>
        </p:confirmDialog>
    </h:form>
</ui:define>
</ui:composition>
