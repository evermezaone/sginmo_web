<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="primefaces">
<h:head>
    <title>Cambiar contraseña — SGInmo Web</title>
    <style>
        body { margin: 0; background: linear-gradient(160deg, #1d3557 0%, #457b9d 100%); min-height: 100vh; }
        .caja { max-width: 400px; margin: 8vh auto 0; background: #fff; border-radius: 10px;
                padding: 2rem 2.2rem 1.6rem; box-shadow: 0 12px 40px rgba(0,0,0,.35); }
        .caja h1 { margin: 0 0 .2rem; font-size: 1.3rem; color: #1d3557; }
        .caja .sub { color: #6c757d; font-size: .85rem; margin: 0 0 1.4rem; }
        .campo { margin-bottom: 1rem; display: flex; flex-direction: column; gap: .3rem; }
        .campo > label { font-weight: 600; font-size: .85rem; color: #495057; }
        .campo .ui-inputtext, .campo .ui-password { width: 100%; }
    </style>
</h:head>
<h:body>
    <div class="caja">
        <h1>Cambiar contraseña</h1>
        <p class="sub">
            Usuario <strong>#{sesionUsuario.codigoUsuario()}</strong>
            <h:outputText value=" — debe cambiar su contraseña para continuar"
                          rendered="#{sesionUsuario.usuario.debeCambiar}"/>
        </p>
        <h:form id="frmCambio">
            <p:messages id="msj" showDetail="false" closable="true"/>
            <div class="campo">
                <label>Contraseña actual</label>
                <p:password value="#{cambioPasswordBean.actual}" label="Contraseña actual" feedback="false"
                            required="true" requiredMessage="Ingrese su contraseña actual" maxlength="60"/>
            </div>
            <div class="campo">
                <label>Contraseña nueva (mínimo 8 caracteres)</label>
                <p:password value="#{cambioPasswordBean.nueva}" label="Contraseña nueva" feedback="true"
                            weakLabel="Débil" goodLabel="Aceptable" strongLabel="Fuerte" promptLabel="Escriba la contraseña"
                            required="true" requiredMessage="Ingrese la contraseña nueva" maxlength="60" toggleMask="true"/>
            </div>
            <div class="campo">
                <label>Repetir contraseña nueva</label>
                <p:password value="#{cambioPasswordBean.repetida}" label="Repetir contraseña" feedback="false"
                            required="true" requiredMessage="Repita la contraseña nueva" maxlength="60"/>
            </div>
            <p:commandButton id="btnCambiar" value="Cambiar contraseña" icon="pi pi-key"
                             action="#{cambioPasswordBean.cambiar()}" update="frmCambio" style="width:100%;"/>
            <p:defaultCommand target="btnCambiar"/>
        </h:form>
        <div style="text-align:center; margin-top: .8rem;">
            <p:link outcome="index" value="Volver al inicio" rendered="#{!sesionUsuario.usuario.debeCambiar}"/>
        </div>
    </div>
</h:body>
</html>
