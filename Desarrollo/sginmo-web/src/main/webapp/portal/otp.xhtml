<ui:composition template="/WEB-INF/portal-acceso.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="primefaces">
<f:metadata>
    <f:viewAction action="#{portalLoginBean.verificarOtp()}"/>
</f:metadata>
<ui:define name="contenido">
    <h1>Codigo de verificacion</h1>
    <p class="sub">Si su documento corresponde a un socio, enviamos un codigo a su email o celular registrado.</p>
    <h:form id="frm">
        <div class="acc-msg"><p:messages showDetail="true" closable="true"/></div>
        <div class="campo-a">
            <label for="frm:cod">Codigo recibido</label>
            <p:inputText id="cod" value="#{portalLoginBean.codigo}" maxlength="8"/>
        </div>
        <p:commandButton value="Validar codigo" icon="pi pi-check" styleClass="acc-btn" ajax="false"
                         action="#{portalLoginBean.validar}"/>
        <div class="acc-alt">
            <p:commandLink value="Reenviar codigo" ajax="false" action="#{portalLoginBean.reenviar}"/>
            &#160;&#183;&#160;
            <h:link value="Volver" outcome="/portal/login"/>
        </div>
    </h:form>
</ui:define>
</ui:composition>
