<ui:composition template="/WEB-INF/portal-acceso.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="primefaces">
<f:metadata>
    <f:viewAction action="#{portalLoginBean.verificarLogin()}"/>
</f:metadata>
<ui:define name="contenido">
    <h1>Portal de socios</h1>
    <p class="sub">Acceda con su documento (CI/RUC) para ver su cuenta.</p>
    <h:form id="frm">
        <div class="acc-msg"><p:messages showDetail="true" closable="true"/></div>

        <div class="campo-a">
            <label for="frm:doc">Documento (CI / RUC)</label>
            <p:inputText id="doc" value="#{portalLoginBean.documento}" maxlength="20"/>
        </div>
        <div class="campo-a">
            <label for="frm:pass">Contrasena</label>
            <p:password id="pass" value="#{portalLoginBean.password}" feedback="false" toggleMask="true"/>
        </div>

        <p:commandButton value="Ingresar" icon="pi pi-sign-in" styleClass="acc-btn" ajax="false"
                         action="#{portalLoginBean.ingresar}"/>
        <div class="acc-alt">
            <p:commandLink value="Primer ingreso o olvide mi contrasena" ajax="false"
                           action="#{portalLoginBean.enviarCodigo}"/>
        </div>
    </h:form>
</ui:define>
</ui:composition>
