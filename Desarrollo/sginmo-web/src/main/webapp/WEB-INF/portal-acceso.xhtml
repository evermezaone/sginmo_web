<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:f="jakarta.faces.core">
<f:view contentType="text/html" encoding="UTF-8">
<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Portal de socios - SGInmo</title>
    <h:outputStylesheet library="primefaces" name="primeicons/primeicons.css"/>
    <style>
        body { margin:0; font-family: system-ui, Arial, sans-serif; background:#0f766e;
               background:linear-gradient(135deg,#0f766e,#0b4f4a); color:#1f2937;
               min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .acc-card { background:#fff; border-radius:14px; padding:1.6rem 1.5rem; width:100%; max-width:380px;
                    box-shadow:0 10px 30px rgba(0,0,0,.25); margin:1rem; }
        .acc-card h1 { font-size:1.25rem; margin:.2rem 0 .1rem; }
        .acc-card .sub { color:#6b7280; font-size:.86rem; margin:0 0 1.1rem; }
        .campo-a { margin-bottom:.85rem; }
        .campo-a label { display:block; font-size:.83rem; color:#374151; margin-bottom:.25rem; }
        .campo-a input, .campo-a select, .campo-a .ui-inputfield, .campo-a .ui-selectonemenu { width:100%; box-sizing:border-box; }
        /* REQ-0101: el p:password (con toggleMask) envuelve el input en un span inline; que ocupe todo el ancho como los demas campos. */
        .campo-a .ui-password { display:block; width:100%; }
        .campo-a .ui-password input { width:100%; box-sizing:border-box; }
        .acc-btn { width:100%; margin-top:.4rem; }
        .acc-alt { text-align:center; margin-top:.9rem; font-size:.85rem; }
        .acc-alt a { color:#0f766e; text-decoration:none; }
        .acc-msg .ui-messages { margin-bottom:.6rem; }
    </style>
</h:head>
<h:body>
    <div class="acc-card">
        <div style="text-align:center; margin-bottom:.6rem;">
            <i class="pi pi-building" style="font-size:1.8rem; color:#0f766e;"></i>
        </div>
        <ui:insert name="contenido"/>
    </div>
</h:body>
</f:view>
</html>
