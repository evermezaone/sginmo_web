<ui:composition template="/WEB-INF/plantilla.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="primefaces">
<f:metadata>
    <f:viewAction action="#{saludBean.verificarAcceso()}"/>
</f:metadata>
<ui:define name="titulo">Salud del sistema</ui:define>
<ui:define name="contenido">
    <h:form id="frmSalud">
        <p:growl id="mensajes" life="3000"/>

        <div class="barra-tabla" style="align-items:center; gap:1rem;">
            <p:tag value="Estado general: #{saludBean.salud.estadoGlobal}"
                   severity="#{saludBean.salud.estadoGlobal eq 'OK' ? 'success' : (saludBean.salud.estadoGlobal eq 'ADVERTENCIA' ? 'warning' : 'danger')}"
                   icon="#{saludBean.salud.estadoGlobal eq 'OK' ? 'pi pi-check' : (saludBean.salud.estadoGlobal eq 'ADVERTENCIA' ? 'pi pi-exclamation-triangle' : 'pi pi-times')}"/>
            <span style="flex:1"></span>
            <span style="color:#6b7280;">
                Versión #{empty saludBean.salud.version ? '—' : saludBean.salud.version}
                · build #{empty saludBean.salud.buildTime ? '—' : saludBean.salud.buildTime}
                <h:outputText rendered="#{not empty saludBean.salud.commit}" value=" · commit #{saludBean.salud.commit}"/>
            </span>
            <p:commandButton value="Refrescar" icon="pi pi-refresh"
                             action="#{saludBean.refrescar()}" update="frmSalud"/>
        </div>

        <p:dataTable id="tabla" var="ind" value="#{saludBean.salud.indicadores}"
                     emptyMessage="Sin indicadores" styleClass="mt-2">
            <p:column headerText="Estado" style="width:9rem; text-align:center;">
                <p:tag value="#{ind.estado}"
                       severity="#{ind.estado eq 'OK' ? 'success' : (ind.estado eq 'ADVERTENCIA' ? 'warning' : 'danger')}"/>
            </p:column>
            <p:column headerText="Indicador" style="width:14rem;">
                <h:outputText value="#{ind.nombre}"/>
            </p:column>
            <p:column headerText="Valor" style="width:20rem;">
                <h:outputText value="#{ind.valor}"/>
            </p:column>
            <p:column headerText="Detalle">
                <h:outputText value="#{ind.detalle}" style="color:#6b7280;"/>
            </p:column>
        </p:dataTable>

        <p style="color:#9ca3af; margin-top:.75rem; font-size:.85rem;">
            Panel de solo lectura. No expone credenciales ni rutas de secretos.
        </p>
    </h:form>
</ui:define>
</ui:composition>
