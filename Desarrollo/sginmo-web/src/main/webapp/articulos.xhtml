<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces">
<h:head>
    <title>Artículos — SGInmo Web</title>
    <style>
        body { margin: 0; background: #f4f6f9; }
        .contenido { max-width: 1150px; margin: 1.5rem auto; padding: 0 1rem; }
        .titulo { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .campo { margin-bottom: .9rem; display: flex; flex-direction: column; gap: .3rem; }
        .campo > label { font-weight: 600; font-size: .85rem; color: #495057; }
        .fila-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 1rem; }
        .pie-dialogo { text-align: right; margin-top: .8rem; border-top: 1px solid #e0e0e0; padding-top: .8rem; }
        .barra-tabla { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; }
        /* Busqueda avanzada: los filtros por columna solo se ven al activarla con el boton */
        .filtros-ocultos .ui-column-filter { display: none !important; }
    </style>
</h:head>
<h:body>
<f:metadata>
    <!-- sin permiso VER, vuelve a Inicio -->
    <f:viewAction action="#{articuloBean.verificarAcceso()}"/>
</f:metadata>
<div class="contenido">
    <div class="titulo">
        <h2 style="margin:0;">Artículos</h2>
        <span style="display:flex; gap:.5rem; align-items:center;">
            <p:button outcome="index" icon="pi pi-home" title="Inicio" styleClass="ui-button-rounded ui-button-outlined"/>
            <h:form style="display:inline;">
                <p:commandButton icon="pi pi-sign-out" title="Cerrar sesión (#{sesionUsuario.codigoUsuario()})" ajax="false"
                                 action="#{sesionUsuario.cerrarSesion()}"
                                 styleClass="ui-button-rounded ui-button-outlined ui-button-secondary"/>
            </h:form>
        </span>
    </div>

    <h:form id="frmLista">
        <p:growl id="mensajes" showDetail="true" skipDetailIfEqualsSummary="true" life="4000"/>

        <!-- El contenedor guarda el estado mostrar/ocultar filtros: no se pierde al re-renderizar la tabla -->
        <h:panelGroup layout="block" id="contFiltros" styleClass="filtros-ocultos">
        <p:dataTable id="tabla" widgetVar="tabla" var="art" value="#{articuloBean.modelo}"
                     lazy="true" paginator="true" rows="10"
                     paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink}"
                     currentPageReportTemplate="{startRecord}-{endRecord} de {totalRecords}"
                     emptyMessage="#{articuloBean.consultaFiltrada ? 'No hay resultados para estos filtros' : 'No hay artículos cargados'}">

            <f:facet name="header">
                <div class="barra-tabla">
                    <p:commandButton value="Nuevo" icon="pi pi-plus"
                                     rendered="#{sesionUsuario.puede('articulos','CREAR')}"
                                     actionListener="#{articuloBean.nuevo()}"
                                     update=":frmEdicion"
                                     oncomplete="PF('dlgArticulo').show(); try{PF('wtabs').select(0)}catch(e){}"/>
                    <p:commandButton id="btnColumnas" icon="pi pi-sliders-h" title="Elegir columnas (afecta la exportación)"
                                     styleClass="ui-button-outlined" type="button"/>
                    <p:columnToggler datasource="tabla" trigger="btnColumnas"/>
                    <!-- pageOnly: se exporta la pagina visible (la exportacion masiva sera un REQ aparte,
                         con limite y proceso asincrono, para no tumbar el servidor por error).
                         Exportar es un PERMISO (EXPORTAR), no un derecho implicito. -->
                    <p:commandButton icon="pi pi-file" title="Exportar CSV (página visible)" styleClass="ui-button-outlined" ajax="false"
                                     rendered="#{sesionUsuario.puede('articulos','EXPORTAR')}">
                        <p:dataExporter type="csv" target="tabla" fileName="articulos" pageOnly="true"/>
                    </p:commandButton>
                    <p:commandButton icon="pi pi-code" title="Exportar XML (página visible)" styleClass="ui-button-outlined" ajax="false"
                                     rendered="#{sesionUsuario.puede('articulos','EXPORTAR')}">
                        <p:dataExporter type="xml" target="tabla" fileName="articulos" pageOnly="true"/>
                    </p:commandButton>
                    <p:commandButton icon="pi pi-file-pdf" title="Exportar PDF (página visible)" styleClass="ui-button-outlined" ajax="false"
                                     rendered="#{sesionUsuario.puede('articulos','EXPORTAR')}">
                        <p:dataExporter type="pdf" target="tabla" fileName="articulos" pageOnly="true"/>
                    </p:commandButton>
                    <span style="flex:1"></span>
                    <p:inputText value="#{articuloBean.filtroGlobal}" placeholder="Buscar código, descripción, tipo o impuesto"
                                 style="width:17rem;">
                        <p:ajax event="keyup" delay="400" update="tabla"/>
                    </p:inputText>
                    <!-- Muestra/oculta los filtros por columna; al ocultarlos los limpia -->
                    <p:commandButton type="button" icon="pi pi-filter" title="Búsqueda avanzada (filtros por columna)"
                                     styleClass="ui-button-outlined"
                                     onclick="var c=document.getElementById('frmLista:contFiltros');c.classList.toggle('filtros-ocultos');if(c.classList.contains('filtros-ocultos'))PF('tabla').clearFilters();"/>
                    <p:commandButton icon="pi pi-filter-slash" title="Limpiar búsqueda y filtros"
                                     styleClass="ui-button-outlined"
                                     actionListener="#{articuloBean.limpiarBusqueda()}"
                                     update="tabla" oncomplete="PF('tabla').clearFilters()"/>
                </div>
            </f:facet>

            <!-- Anchos segun dominio del dato: codigo/estado angostos, descripcion toma el resto.
                 Orden: click en el titulo. Filtros por columna: combos de igualdad exacta. -->
            <p:column headerText="Código" sortBy="#{art.codigo}" filterBy="#{art.codigo}"
                      style="width:6rem; white-space:nowrap;" toggleable="false">
                <h:outputText value="#{art.codigo}"/>
            </p:column>
            <p:column headerText="Descripción" sortBy="#{art.descripcion}" filterBy="#{art.descripcion}"
                      style="min-width:18rem;">
                <h:outputText value="#{art.descripcion}"/>
            </p:column>
            <p:column headerText="Tipo" sortBy="#{art.tipo}" filterBy="#{art.tipo}" style="width:8rem;">
                <f:facet name="filter">
                    <p:selectOneMenu onchange="PF('tabla').filter()" styleClass="ui-column-filter">
                        <f:selectItem itemLabel="Todos" itemValue="#{null}" noSelectionOption="true"/>
                        <f:selectItem itemLabel="Servicio" itemValue="SERVICIO"/>
                        <f:selectItem itemLabel="Producto" itemValue="PRODUCTO"/>
                    </p:selectOneMenu>
                </f:facet>
                <h:outputText value="#{art.tipo}"/>
            </p:column>
            <p:column headerText="Impuesto" sortBy="#{art.impuesto.descripcion}" filterBy="#{art.impuesto.descripcion}"
                      style="width:8rem;">
                <f:facet name="filter">
                    <p:selectOneMenu onchange="PF('tabla').filter()" styleClass="ui-column-filter">
                        <f:selectItem itemLabel="Todos" itemValue="#{null}" noSelectionOption="true"/>
                        <f:selectItems value="#{articuloBean.impuestos}" var="impF"
                                       itemLabel="#{impF.descripcion}" itemValue="#{impF.descripcion}"/>
                    </p:selectOneMenu>
                </f:facet>
                <h:outputText value="#{art.impuesto.descripcion}"/>
            </p:column>
            <p:column headerText="Precio (Gs.)" sortBy="#{art.precioUnitario}"
                      style="width:7.5rem; text-align:right; white-space:nowrap;">
                <h:outputText value="#{art.precioUnitario}">
                    <f:convertNumber groupingUsed="true" maxFractionDigits="0"/>
                </h:outputText>
            </p:column>
            <p:column headerText="Estado" sortBy="#{art.estado}" filterBy="#{art.estado}"
                      style="width:7rem; text-align:center;">
                <f:facet name="filter">
                    <p:selectOneMenu onchange="PF('tabla').filter()" styleClass="ui-column-filter">
                        <f:selectItem itemLabel="Todos" itemValue="#{null}" noSelectionOption="true"/>
                        <f:selectItem itemLabel="Activo" itemValue="ACTIVO"/>
                        <f:selectItem itemLabel="Inactivo" itemValue="INACTIVO"/>
                    </p:selectOneMenu>
                </f:facet>
                <p:tag value="#{art.estado}" severity="#{art.estado eq 'ACTIVO' ? 'success' : 'danger'}"/>
            </p:column>
            <!-- Datos de auditoria: SOLO administrador o permiso VER_AUDITORIA (ocultas por
                 defecto; se activan desde el selector de columnas) -->
            <p:column headerText="Modificado por" visible="false" style="width:8rem;"
                      rendered="#{sesionUsuario.puede('articulos','VER_AUDITORIA')}">
                <h:outputText value="#{empty art.usuarioModificacion ? art.usuarioCreacion : art.usuarioModificacion}"/>
            </p:column>
            <p:column headerText="Fecha modif." visible="false" style="width:9rem; white-space:nowrap;"
                      rendered="#{sesionUsuario.puede('articulos','VER_AUDITORIA')}">
                <h:outputText value="#{empty art.fechaModificacion ? art.fechaCreacion : art.fechaModificacion}">
                    <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy HH:mm"/>
                </h:outputText>
            </p:column>
            <p:column headerText="Acciones" style="width:6.5rem; text-align:center;" exportable="false" toggleable="false">
                <!-- con EDITAR: lapiz (edicion); solo con VER: ojo (consulta, dialogo bloqueado) -->
                <p:commandButton icon="#{sesionUsuario.puede('articulos','EDITAR') ? 'pi pi-pencil' : 'pi pi-eye'}"
                                 title="#{sesionUsuario.puede('articulos','EDITAR') ? 'Editar' : 'Ver detalle'}"
                                 styleClass="ui-button-flat"
                                 actionListener="#{articuloBean.editar(art)}"
                                 update=":frmEdicion"
                                 oncomplete="PF('dlgArticulo').show(); try{PF('wtabs').select(0)}catch(e){}"/>
                <p:commandButton icon="#{art.estado eq 'ACTIVO' ? 'pi pi-ban' : 'pi pi-check-circle'}"
                                 title="#{art.estado eq 'ACTIVO' ? 'Inactivar' : 'Activar'}"
                                 styleClass="ui-button-flat"
                                 rendered="#{sesionUsuario.puede('articulos', art.estado eq 'ACTIVO' ? 'INACTIVAR' : 'REACTIVAR')}"
                                 actionListener="#{articuloBean.cambiarEstado(art)}"
                                 update="tabla mensajes">
                    <p:confirm header="Confirmar"
                               message="¿#{art.estado eq 'ACTIVO' ? 'Inactivar' : 'Activar'} el artículo #{art.descripcion}?"
                               icon="pi pi-exclamation-triangle"/>
                </p:commandButton>
            </p:column>
        </p:dataTable>
        </h:panelGroup>

        <p:confirmDialog global="true" showEffect="fade">
            <p:commandButton value="Sí" type="button" styleClass="ui-confirmdialog-yes"/>
            <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-secondary"/>
        </p:confirmDialog>
    </h:form>

    <p:dialog header="Artículo" widgetVar="dlgArticulo" modal="true" resizable="false"
              responsive="true" width="680" dynamic="true" closeOnEscape="true">
        <h:form id="frmEdicion">
            <p:messages id="msjEdicion" showDetail="true" skipDetailIfEqualsSummary="true" closable="true"/>
            <ui:fragment rendered="#{not empty articuloBean.seleccionado}">

                <!-- Al abrir el dialogo siempre se vuelve a Principal via PF('wtabs').select(0)
                     (evita el desfasaje titulo/contenido observado por el usuario) -->
                <p:tabView id="tabs" widgetVar="wtabs" activeIndex="#{articuloBean.tabActivo}">
                    <!-- TAB 1: lo principal -->
                    <p:tab title="Principal">
                        <div class="fila-2">
                            <div class="campo">
                                <label>Código *</label>
                                <p:inputText value="#{articuloBean.seleccionado.codigo}" required="true" label="Código"
                                             disabled="#{articuloBean.soloLectura}"
                                             requiredMessage="El código es obligatorio" maxlength="25">
                                    <!-- aviso temprano de duplicado al salir del campo (el guardado re-valida igual) -->
                                    <p:ajax event="change" listener="#{articuloBean.verificarCodigo()}"
                                            process="@this" update=":frmEdicion:msjEdicion"/>
                                </p:inputText>
                            </div>
                            <div class="campo">
                                <label>Tipo *</label>
                                <p:selectOneMenu value="#{articuloBean.seleccionado.tipo}" required="true" label="Tipo"
                                                 disabled="#{articuloBean.soloLectura}"
                                                 requiredMessage="El tipo es obligatorio">
                                    <f:selectItem itemLabel="Seleccione..." itemValue="#{null}" noSelectionOption="true"/>
                                    <f:selectItem itemLabel="Servicio" itemValue="SERVICIO"/>
                                    <f:selectItem itemLabel="Producto" itemValue="PRODUCTO"/>
                                </p:selectOneMenu>
                            </div>
                        </div>
                        <div class="campo">
                            <label>Descripción *</label>
                            <p:inputText value="#{articuloBean.seleccionado.descripcion}" required="true" label="Descripción"
                                         disabled="#{articuloBean.soloLectura}"
                                         requiredMessage="La descripción es obligatoria" maxlength="150" style="width:100%;"/>
                        </div>
                        <div class="fila-2">
                            <div class="campo">
                                <label>Impuesto *</label>
                                <p:selectOneMenu value="#{articuloBean.seleccionado.impuesto}" required="true" label="Impuesto"
                                                 disabled="#{articuloBean.soloLectura}"
                                                 requiredMessage="El impuesto es obligatorio" converter="impuestoConverter">
                                    <f:selectItem itemLabel="Seleccione..." itemValue="#{null}" noSelectionOption="true"/>
                                    <f:selectItems value="#{articuloBean.impuestos}" var="imp"
                                                   itemLabel="#{imp.descripcion}" itemValue="#{imp}"/>
                                </p:selectOneMenu>
                            </div>
                            <div class="campo">
                                <label>Precio unitario (Gs.)</label>
                                <p:inputNumber value="#{articuloBean.seleccionado.precioUnitario}" label="Precio unitario"
                                               disabled="#{articuloBean.soloLectura}"
                                               decimalPlaces="0" thousandSeparator="." decimalSeparator=","/>
                            </div>
                        </div>
                    </p:tab>

                    <!-- TAB 2: clasificacion -->
                    <p:tab title="Clasificación">
                        <div class="fila-2">
                            <div class="campo">
                                <label>Categoría</label>
                                <p:selectOneMenu value="#{articuloBean.seleccionado.categoriaCodigo}" label="Categoría"
                                                 disabled="#{articuloBean.soloLectura}">
                                    <f:selectItem itemLabel="Sin categoría" itemValue="#{null}" noSelectionOption="true"/>
                                    <f:selectItems value="#{articuloBean.categorias}" var="cat"
                                                   itemLabel="#{cat.descripcion}" itemValue="#{cat.codigo}"/>
                                </p:selectOneMenu>
                            </div>
                            <div class="campo">
                                <label>Unidad de medida</label>
                                <p:selectOneMenu value="#{articuloBean.seleccionado.unidadMedidaCodigo}" label="Unidad de medida"
                                                 disabled="#{articuloBean.soloLectura}">
                                    <f:selectItem itemLabel="Sin unidad" itemValue="#{null}" noSelectionOption="true"/>
                                    <f:selectItems value="#{articuloBean.unidadesMedida}" var="um"
                                                   itemLabel="#{um.descripcion}" itemValue="#{um.codigo}"/>
                                </p:selectOneMenu>
                            </div>
                        </div>
                        <div class="fila-2">
                            <div class="campo">
                                <label>Movimiento de dinero</label>
                                <p:selectOneMenu value="#{articuloBean.seleccionado.tipoMovimiento}" label="Movimiento de dinero"
                                                 disabled="#{articuloBean.soloLectura}">
                                    <f:selectItem itemLabel="No aplica" itemValue="#{null}" noSelectionOption="true"/>
                                    <f:selectItem itemLabel="Ingreso" itemValue="INGRESO"/>
                                    <f:selectItem itemLabel="Egreso" itemValue="EGRESO"/>
                                    <f:selectItem itemLabel="Descuento" itemValue="DESCUENTO"/>
                                </p:selectOneMenu>
                            </div>
                            <div class="campo">
                                <label>Aplicación (clave del negocio)</label>
                                <p:inputText value="#{articuloBean.seleccionado.aplicacion}" label="Aplicación" maxlength="30"
                                             disabled="#{articuloBean.soloLectura}">
                                    <p:ajax event="change" listener="#{articuloBean.verificarAplicacion()}"
                                            process="@this" update=":frmEdicion:msjEdicion"/>
                                </p:inputText>
                            </div>
                        </div>
                        <div class="campo">
                            <label>Modifica estado del documento (cuadre)</label>
                            <p:toggleSwitch value="#{articuloBean.seleccionado.modificaEstado}"
                                            disabled="#{articuloBean.soloLectura}"/>
                        </div>
                    </p:tab>

                    <!-- TAB 3: stock y observacion -->
                    <p:tab title="Stock y notas">
                        <div class="fila-2">
                            <div class="campo">
                                <label>Stock mínimo</label>
                                <p:inputNumber value="#{articuloBean.seleccionado.stockMinimo}" label="Stock mínimo"
                                               disabled="#{articuloBean.soloLectura}"
                                               decimalPlaces="0" thousandSeparator="."/>
                            </div>
                            <div class="campo">
                                <label>Stock máximo</label>
                                <p:inputNumber value="#{articuloBean.seleccionado.stockMaximo}" label="Stock máximo"
                                               disabled="#{articuloBean.soloLectura}"
                                               decimalPlaces="0" thousandSeparator="."/>
                            </div>
                        </div>
                        <div class="campo">
                            <label>Observación</label>
                            <p:inputTextarea value="#{articuloBean.seleccionado.observacion}" rows="3" label="Observación"
                                             disabled="#{articuloBean.soloLectura}"
                                             maxlength="250" style="width:100%;" autoResize="false"/>
                        </div>
                    </p:tab>

                    <!-- TAB 4: atributos parametrizables — habilitado solo con articulo guardado -->
                    <p:tab title="Propiedades" disabled="#{articuloBean.seleccionado.id == null}"
                           titletip="#{articuloBean.seleccionado.id == null ? 'Guarde el artículo para habilitar sus propiedades' : ''}">
                        <div class="fila-2" style="align-items:end;">
                            <div class="campo">
                                <label>Propiedad</label>
                                <p:selectOneMenu id="cboPropiedad" value="#{articuloBean.nuevaPropiedadCodigo}" label="Propiedad"
                                                 disabled="#{articuloBean.soloLectura}">
                                    <f:selectItem itemLabel="Seleccione..." itemValue="#{null}" noSelectionOption="true"/>
                                    <f:selectItems value="#{articuloBean.propiedadesDisponibles}" var="pd"
                                                   itemLabel="#{pd.descripcion}" itemValue="#{pd.codigo}"/>
                                </p:selectOneMenu>
                            </div>
                            <div class="campo">
                                <label>Valor</label>
                                <div style="display:flex; gap:.5rem;">
                                    <p:inputText id="txtValorPropiedad" value="#{articuloBean.nuevaPropiedadValor}"
                                                 disabled="#{articuloBean.soloLectura}"
                                                 label="Valor" maxlength="100" style="flex:1;"/>
                                    <!-- process parcial: no valida los campos de los otros tabs -->
                                    <p:commandButton icon="pi pi-plus" title="Agregar"
                                                     rendered="#{!articuloBean.soloLectura}"
                                                     actionListener="#{articuloBean.agregarPropiedad()}"
                                                     process="@this cboPropiedad txtValorPropiedad"
                                                     update="tblPropiedades cboPropiedad txtValorPropiedad :frmEdicion:msjEdicion"/>
                                </div>
                            </div>
                        </div>
                        <p:dataTable id="tblPropiedades" var="prop" value="#{articuloBean.propiedades}"
                                     emptyMessage="Sin propiedades cargadas" style="margin-top:.5rem;">
                            <p:column headerText="Propiedad" style="width:14rem;">
                                <h:outputText value="#{prop.propiedadCodigo}"/>
                            </p:column>
                            <p:column headerText="Valor">
                                <h:outputText value="#{prop.valor}"/>
                            </p:column>
                            <p:column style="width:4rem; text-align:center;">
                                <p:commandButton icon="pi pi-trash" styleClass="ui-button-flat ui-button-danger" title="Quitar"
                                                 rendered="#{!articuloBean.soloLectura}"
                                                 actionListener="#{articuloBean.eliminarPropiedad(prop.id)}"
                                                 process="@this"
                                                 update="tblPropiedades :frmEdicion:msjEdicion"/>
                            </p:column>
                        </p:dataTable>
                    </p:tab>
                </p:tabView>

                <!-- Botones SIEMPRE visibles, fuera de los tabs -->
                <div class="pie-dialogo">
                    <p:commandButton value="Cancelar" type="button" onclick="PF('dlgArticulo').hide()"
                                     styleClass="ui-button-secondary" style="margin-right:.5rem;"/>
                    <p:commandButton value="Guardar" icon="pi pi-save"
                                     rendered="#{!articuloBean.soloLectura}"
                                     actionListener="#{articuloBean.guardar()}"
                                     update="msjEdicion tabs :frmLista:tabla :frmLista:mensajes"/>
                </div>
            </ui:fragment>
        </h:form>
    </p:dialog>
</div>
</h:body>
</html>
