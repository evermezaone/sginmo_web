<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="primefaces">
<h:head>
    <title>SGInmo Web</title>
</h:head>
<h:body>
    <div style="max-width: 640px; margin: 4rem auto;">
        <h:form style="display:flex; justify-content:flex-end; align-items:center; gap:.6rem; margin-bottom:.6rem;">
            <span style="color:#495057; font-size:.9rem;">
                <strong>#{sesionUsuario.usuario.codigoUsuario}</strong> (#{sesionUsuario.usuario.perfil})
            </span>
            <p:commandButton value="Salir" icon="pi pi-sign-out" ajax="false"
                             action="#{sesionUsuario.cerrarSesion()}"
                             styleClass="ui-button-secondary ui-button-outlined"/>
        </h:form>
        <p:panel header="#{inicioBean.sistema} — esqueleto operativo">
            <p style="margin: 0 0 1rem 0;">
                Versión <strong>#{inicioBean.version}</strong>
            </p>
            <p style="margin: 0 0 1rem 0; color: #666;">
                #{inicioBean.stack}
            </p>
            <p style="margin: 0 0 1rem 0;">
                <h:outputLink value="articulos.xhtml">➜ ABM de Artículos (propuesta de patrón estándar)</h:outputLink>
            </p>
            <h:form>
                <p:commandButton value="Probar AJAX (JSF + PrimeFaces)"
                                 update="resultado"
                                 icon="pi pi-check"/>
                <p:outputPanel id="resultado" style="margin-top: 1rem;">
                    <h:outputText value="Render #{inicioBean.version} — AJAX OK a las "
                                  rendered="#{facesContext.postback}"/>
                    <h:outputText value="#{inicioBean.hora}"
                                  rendered="#{facesContext.postback}"/>
                </p:outputPanel>
            </h:form>
        </p:panel>
    </div>
</h:body>
</html>
