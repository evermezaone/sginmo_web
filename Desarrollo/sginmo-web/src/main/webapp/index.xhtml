<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="primefaces">
<h:head>
    <title>SGInmo Web</title>
</h:head>
<h:body>
    <div style="max-width: 640px; margin: 4rem auto;">
        <p:panel header="#{inicioBean.sistema} — esqueleto operativo">
            <p style="margin: 0 0 1rem 0;">
                Versión <strong>#{inicioBean.version}</strong>
            </p>
            <p style="margin: 0 0 1rem 0; color: #666;">
                #{inicioBean.stack}
            </p>
            <h:form>
                <p:commandButton value="Probar AJAX (JSF + PrimeFaces)"
                                 update="resultado"
                                 icon="pi pi-check"/>
                <p:outputPanel id="resultado" style="margin-top: 1rem;">
                    <h:outputText value="Render #{inicioBean.version} — AJAX OK a las "
                                  rendered="#{facesContext.postback}"/>
                    <h:outputText value="#{inicioBean.hora}"
                                  rendered="#{facesContext.postback}"/>
                </p:outputPanel>
            </h:form>
        </p:panel>
    </div>
</h:body>
</html>
